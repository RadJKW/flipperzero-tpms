name: "FAP: Release assets"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with ufbt (release SDK)
        uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
        id: build-app
        with:
          sdk-channel: release

      - name: Collect release files
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          SOURCE_PATH="${{ steps.build-app.outputs.fap-artifacts }}"
          if [ -d "$SOURCE_PATH" ]; then
            FAP_FILE="$(find "$SOURCE_PATH" -maxdepth 2 -type f -name '*.fap' | head -n1)"
          else
            FAP_FILE="$SOURCE_PATH"
          fi

          if [ -z "${FAP_FILE:-}" ] || [ ! -f "$FAP_FILE" ]; then
            echo "Could not find built .fap in: $SOURCE_PATH"
            exit 1
          fi

          cp "$FAP_FILE" release/tpms.fap
          zip -j "release/tpms-${GITHUB_REF_NAME}.zip" release/tpms.fap

          echo "fap=release/tpms.fap" >> "$GITHUB_OUTPUT"
          echo "zip=release/tpms-${GITHUB_REF_NAME}.zip" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.collect.outputs.fap }}
            ${{ steps.collect.outputs.zip }}
