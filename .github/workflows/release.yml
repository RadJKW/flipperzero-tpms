name: "FAP: Release assets"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache uFBT state
        uses: actions/cache@v5
        with:
          path: ~/.ufbt
          key: ${{ runner.os }}-ufbt-release-${{ hashFiles('application.fam', '.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-ufbt-release-
            ${{ runner.os }}-ufbt-

      - name: Install uFBT
        run: python3 -m pip install --upgrade pip ufbt

      - name: Update SDK
        run: ufbt update --channel=release

      - name: Build with uFBT (release SDK)
        run: ufbt -s

      - name: Collect release files
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          FAP_FILE="$(find dist -maxdepth 1 -type f -name '*.fap' | head -n1)"

          if [ -z "${FAP_FILE:-}" ] || [ ! -f "$FAP_FILE" ]; then
            echo "Could not find built .fap in dist/"
            exit 1
          fi

          cp "$FAP_FILE" release/tpms.fap
          zip -j "release/tpms-${GITHUB_REF_NAME}.zip" release/tpms.fap

          echo "fap=release/tpms.fap" >> "$GITHUB_OUTPUT"
          echo "zip=release/tpms-${GITHUB_REF_NAME}.zip" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.collect.outputs.fap }}
            ${{ steps.collect.outputs.zip }}
