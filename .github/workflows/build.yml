name: "FAP: Build and lint"
on: [push, pull_request]

permissions:
  contents: read

jobs:
  ufbt-build-action:
    runs-on: ubuntu-latest
    name: 'ufbt: Build for Dev branch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache uFBT state
        uses: actions/cache@v5
        with:
          path: ~/.ufbt
          key: ${{ runner.os }}-ufbt-${{ hashFiles('application.fam', '.github/workflows/build.yml') }}
          restore-keys: |
            ${{ runner.os }}-ufbt-

      - name: Install uFBT
        run: python3 -m pip install --upgrade pip ufbt

      - name: Update SDK
        run: ufbt update --channel=dev

      - name: Build with uFBT
        run: ufbt -s

      - name: Upload app artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}-dev
          path: dist/*.fa[pl]
          if-no-files-found: error

      - name: Lint sources
        run: ufbt lint -s
